# Publish job for EC2 Auto Scaling
.deploy_ec2:
  image: amazon/aws-cli
  before_script:
    - aws --version
    - echo "AWS CLI version check complete."
    - yum  install -y gettext jq
    - gettext --version
  script:
    - |
        escape_sed() {
          echo "$1" | sed -e 's/[\/&]/\\&/g' -e  's/\\/\\\\/g'
        }

        if [ "$DO_BUILD" = "false" ]; then
            CI_PIPELINE_IID=$DEFAULT_PIPELINE_ID
        fi
        
        if [ ! -z "$CI_COMMIT_TAG" ]; then
          PIPELINE_ID=$CI_COMMIT_TAG
        else
          PIPELINE_ID=$CI_PIPELINE_IID
        fi

        ESCAPED_S3_BUCKET=$(escape_sed "$S3_BUCKET")
        ESCAPED_TEMPLATE_SETTING_FILE=$(escape_sed "$TEMPLATE_SETTING_FILE")
        ESCAPED_SETTING_FILE=$(escape_sed "$SETTING_FILE")
        ESCAPED_TEMPLATE_WEBCONF_FILE=$(escape_sed "$TEMPLATE_WEBCONF_FILE")
        ESCAPED_WEBCONF_FILE=$(escape_sed "$WEBCONF_FILE")
        ESCAPED_TEMPLATE_JASPER_FILE=$(escape_sed "$TEMPLATE_JASPER_FILE")
        ESCAPED_JASPER_FILE=$(escape_sed "$JASPER_FILE")
        ESCAPED_TEMPLATE_DBDEPLOY_FILE=$(escape_sed "$TEMPLATE_DBDEPLOY_FILE")
        ESCAPED_DBDEPLOY_FILE=$(escape_sed "$DBDEPLOY_FILE")
        ESCAPED_DEPLOY_SOURCE=$(escape_sed "$DEPLOY_SOURCE")
        ESCAPED_SECRET_JOIN_AD=$(escape_sed "$SECRET_JOIN_AD")
        ESCAPED_SECRET_UPDATE_USER=$(escape_sed "$SECRET_UPDATE_USER")
        ESCAPED_SERVICE_USER=$(escape_sed "$SERVICE_USER")

        ls -l $DEPLOY_SCRIPT_FILE

        echo "==== Creation du userdata ===="
        # PowerShell script to download ZIP files from S3
        sed -e "s|__S3_BUCKET__|${ESCAPED_S3_BUCKET}|g" -e "s|__ZIP_FILES__|${ZIP_FILES}|g" -e "s|__CI_PIPELINE_IID__|${PIPELINE_ID}|g" -e "s|__TEMPLATE_SETTING_FILE__|${ESCAPED_TEMPLATE_SETTING_FILE}|g"  -e "s|__SETTING_FILE__|${ESCAPED_SETTING_FILE}|g"  -e "s|__TEMPLATE_WEBCONF_FILE__|${ESCAPED_TEMPLATE_WEBCONF_FILE}|g"   -e "s|__WEBCONF_FILE__|${ESCAPED_WEBCONF_FILE}|g"  -e "s|__TEMPLATE_JASPER_FILE__|${ESCAPED_TEMPLATE_JASPER_FILE}|g" -e "s|__JASPER_FILE__|${ESCAPED_JASPER_FILE}|g"  -e "s|__TEMPLATE_DBDEPLOY_FILE__|${ESCAPED_TEMPLATE_DBDEPLOY_FILE}|g"  -e "s|__DBDEPLOY_FILE__|${ESCAPED_DBDEPLOY_FILE}|g"  -e "s|__DEPLOY_SOURCE__|${ESCAPED_DEPLOY_SOURCE}|g" -e "s|__SECRET_JOIN_AD__|$SECRET_JOIN_AD|g" -e "s|__SECRET_UPDATE_USER__|$SECRET_UPDATE_USER|g" -e "s|__SERVICE_USER__|$ESCAPED_SERVICE_USER|g" -e "s|__DD_ENV__|$DD_ENV|g" -e "s|__CW_LOGS_GROUP__|$CWLOGSGROUP|g"  $DEPLOY_SCRIPT_FILE > script_userdata.ps1 
        export ENCODED_NEW_USER_DATA=$(base64 -w 0 script_userdata.ps1)
        #echo "New UserData (Base64 Encoded) $ENCODED_NEW_USER_DATA"

        echo "==== Fin de creation du userdata ===="

        echo "==== Creation du launch Template ===="
  
        cat $LAUNCH_TEMPLATE_DATA | envsubst > /tmp/launch-tmp.json

        LT_DEFAULT_VERSION=$(aws ec2 describe-launch-template-versions --launch-template-id $LAUNCH_TEMPLATE_ID --query 'LaunchTemplateVersions[0].VersionNumber' --versions $Default --output text)
        echo "Launch Template Default Version : $LT_DEFAULT_VERSION"

        LT_NEW_VERSION=$(aws ec2 create-launch-template-version --launch-template-name $LAUNCH_TEMPLATE_NAME --source-version $LT_DEFAULT_VERSION  --launch-template-data "$(cat /tmp/launch-tmp.json)" --query 'LaunchTemplateVersion.VersionNumber' --output text)
        echo "Launch Template Nouvelle Version : $LT_NEW_VERSION"

        echo "==== Fin de  Creation du launch Template ===="

        # Update the Auto Scaling group to use the new Launch Template version
        echo "==== Mise a jour autoscaling ===="

        aws autoscaling update-auto-scaling-group --auto-scaling-group-name $AUTO_SCALING_GROUP_NAME --launch-template LaunchTemplateName=$LAUNCH_TEMPLATE_NAME,Version=$LT_NEW_VERSION  --desired-capacity 1 --min-size 1 --max-size 1

        echo "==== Fin Mise a jour autoscaling ===="

        echo "==== Launch Template et Auto Scaling Group mis à jour avec success. ===="

        echo "==== Debut du rafraichissement de l'instance ===="

        aws autoscaling start-instance-refresh --auto-scaling-group-name $AUTO_SCALING_GROUP_NAME --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 400}'

        echo "==== Fin  du rafraichissement de l'instance ===="

        echo "==== Attendre que les anciennes instances passe en status terminating....... ===="
        sleep 60

        echo "==== Debut du processus de Deploiement. ===="

        TIMEOUT=2400
        INTERVAL=60
        ELAPSED=0
        # Attendre que toutes les instances soient InService ET running
        while [ $ELAPSED -lt $TIMEOUT ]; do
          INSTANCEIDS=$(aws autoscaling describe-auto-scaling-groups --auto-scaling-group-name  "$AUTO_SCALING_GROUP_NAME" --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' --output text)
          RUNNING_OK=1
          for inst in $INSTANCEIDS; do
            STATE=$(aws ec2 describe-instances --instance-ids $inst --query 'Reservations[0].Instances[0].State.Name' --output text)
            if [ "$STATE" != "running" ]; then
              RUNNING_OK=0
            fi
          done
          if [ $RUNNING_OK -eq 1 ] && [ "$INSTANCEIDS" != "" ]; then
            echo "Les instances en services et running sont : $INSTANCEIDS"
            break
          fi
          sleep $INTERVAL
          ELAPSED=$((ELAPSED+INTERVAL))
          echo "En Attente  que toutes les instances soit InService/running ($ELAPSED s)"
        done
        if [ $ELAPSED -ge $TIMEOUT ]; then
          echo "Instances n'ont pas pu être être  InService/running apres $TIMEOUT secondes"
          exit 1
        fi
        # Pour chaque instance, attendre le log stream puis lire les logs de façon incrémentale
        PASSED_ALL=1
        for inst in $INSTANCEIDS; do
          LOGSTREAM="${inst}-${SERVER_TYPE}-${PIPELINE_ID}"
          #LOGSTREAM="${inst}-${SERVER_TYPE}-100"
          WAIT_STREAM=1800 # 30 minutes
          ELAPSED_STREAM=0
          while [ $ELAPSED_STREAM -lt $WAIT_STREAM ]; do
            FOUND=$(aws logs describe-log-streams --log-group-name "$CWLOGSGROUP" --log-stream-name-prefix "$LOGSTREAM" --query 'logStreams[*].logStreamName' --output text)
            if [ "x$FOUND" != "x" ]; then
              break
            fi
            sleep 60
            ELAPSED_STREAM=$((ELAPSED_STREAM + 60))
            echo "Instance $inst: En attente du logstream $LOGSTREAM ($ELAPSED_STREAM s)"
          done
          if [ $ELAPSED_STREAM -ge $WAIT_STREAM ]; then
            echo "Timeout pour le logstream $LOGSTREAM du serveur de  ${SERVER_TYPE} pour  instance $inst"
            PASSED_ALL=0
            continue
          fi
          echo "==== CLOUDWATCH LOGS for $inst ===="
          END_FOUND=0
          SEARCH_TIMEOUT=1800 # 30 min max d'attente pour la bonne ligne
          SEARCH_INTERVAL=15
          SEARCH_ELAPSED=0
          NEXT_TOKEN=""
          while [ $SEARCH_ELAPSED -lt $SEARCH_TIMEOUT ]; do
            if [ -z "$NEXT_TOKEN" ]; then
              RESPONSE=$(aws logs get-log-events --log-group-name "$CWLOGSGROUP" --log-stream-name "$LOGSTREAM" --output json)
            else
              RESPONSE=$(aws logs get-log-events --log-group-name "$CWLOGSGROUP" --log-stream-name "$LOGSTREAM" --next-token "$NEXT_TOKEN" --output json)
            fi
            # Afficher les nouveaux événements uniquement
            #echo "$RESPONSE" | jq -r '.events[].message'
            echo "$RESPONSE" | jq -r '.events[].message' | while IFS= read -r line; do
                echo -e "\e[33m$line\e[0m"   # Jaune
            done
            # Vérifie la présence de 'Fin du userdata'
            if echo "$RESPONSE" | jq -r '.events[].message' | grep -q "Fin du userdata"; then
              echo "SUCCESS: 'Ton Deploiement du  ${SERVER_TYPE} est terminé dans la machine $inst , verifié les logs pour plus dinformations'."
              END_FOUND=1
              break
            fi
            # Met à jour le nextForwardToken
            NEXT_TOKEN=$(echo "$RESPONSE" | jq -r '.nextForwardToken')
            sleep $SEARCH_INTERVAL
            SEARCH_ELAPSED=$((SEARCH_ELAPSED + $SEARCH_INTERVAL))
            #echo "Waiting for 'Fin du userdata' in logs for $inst... ($SEARCH_ELAPSED s)"
          done
          if [ $END_FOUND -eq 0 ]; then
            echo "ECHEC: problème avec logs pour linstance $inst."
            PASSED_ALL=0
          fi
          echo "==== END CLOUDWATCH LOGS for $inst ===="
        done

        if [ $PASSED_ALL -eq 1 ]; then
          echo "Toutes les instances on executées le user data."
          exit 0
        else
          echo "ECHEC: Des instances ont échouées lors de l'execution du userdata."
          exit 1
        fi

        echo "==== Fin du processus de Deploiement,  attendre le healthcheck. ===="
  variables:
    SETTING_FILE: "$DEPLOY_SOURCE\\Configs\\settings.json"
    WEBCONF_FILE: "$DEPLOY_SOURCE\\Configs\\Web.config"
    JASPER_FILE: "$DEPLOY_SOURCE\\Configs\\JasperReports.config"
    DBDEPLOY_FILE: "$DEPLOY_SOURCE\\Configs\\dbdeploy.config"
  tags:
    - prd
  only:
    - tags

