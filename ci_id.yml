.dbdeploy:
  image : registry.gitlab.com/veolia.com/sarp/sarp/sarpdevint/ci-cd-repository/sarp-dotnet/db-deploy:latest
  variables:
    SHELL: powershell
  before_script:
    - $ErrorActionPreference = "Stop"
  script:
    - aws --version
    - Write-Host "AWS CLI version check complete."

    - |
      if ($env:DO_BUILD -eq "false") {
        $PIPELINE_ID = $env:DEFAULT_PIPELINE_ID
      } ElseIf ([string]::IsNullOrEmpty($env:CI_COMMIT_TAG)) {
        $PIPELINE_ID = $env:CI_PIPELINE_IID
      } Else {
        $PIPELINE_ID = $env:CI_COMMIT_TAG
      }

    - $OBJECT_KEY_CONFIGS_SERVICE = "jason/$env:S3_ENV/$PIPELINE_ID/Services/Configs.zip"
    - $OBJECT_KEY_DB = "jason/$env:S3_ENV/$PIPELINE_ID/Services/Db.zip"

    - |
      if (-not (Test-Path C:\Database)) {
        New-Item -ItemType Directory -Path C:\Database -Force | Out-Null
      }
    - aws s3 cp "s3://$env:S3_BUCKET/$OBJECT_KEY_DB" C:\Database\Db.zip
    - Expand-Archive -Path C:\Database\Db.zip -DestinationPath C:\Database -Force

    - |
      if (-not (Test-Path C:\Configs)) {
        New-Item -ItemType Directory -Path C:\Configs -Force | Out-Null
      }
    - aws s3 cp "s3://$env:S3_BUCKET/$OBJECT_KEY_CONFIGS_SERVICE" C:\Configs\Configs.zip
    - Expand-Archive -Path C:\Configs\Configs.zip -DestinationPath C:\Configs -Force
    
    - |
      if (Test-Path C:\DbDeploy\DatabaseDeploy.exe.config) {
        Remove-Item -Path C:\DbDeploy\DatabaseDeploy.exe.config -Force
      }
    - Copy-Item -Path $env:TEMPLATE_DBDEPLOY_FILE -Destination C:\DbDeploy\DatabaseDeploy.exe.config.secret -Force
    - PowerShell -ExecutionPolicy Bypass -File C:\aws_secret_replacement.ps1
    - C:\DbDeploy\DatabaseDeploy.exe
    - cd C:\tmp
    - dir
  artifacts:
      when: always
      paths:
        - C:\tmp\*
  tags:
    - prd-win-2022
  only:
    - tags

