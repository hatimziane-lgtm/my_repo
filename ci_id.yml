# Define global variables used throughout the pipeline.
variables:
  REPO_URL: https://gitlab.com/veolia.com/sarp/sarp/SARPDEVInt/ci-cd-repository/ci-dotnet-mvc
  SONAR_PROJECT_NAME: "veolia-com-sarp-sarp-jason-jasoncodebase:10569998"
  PROJECT_PATH: "./WebApplicationMVC"
  PROJECT_SOURCES_PATH: "."
  SONAR_ANALYSIS: false
  IS_TEST: true
  DO_BUILD: true
  DEFAULT_PIPELINE_ID: 243

# include:
#   - local: /template_CI/build.yml
#   - local: /template_CI/deploy.yml
#   - local: /template_CI/publish.yml


# Define the stages of the CI/CD pipeline.
stages:
  - build
  - push-s3
  - deploy-rec
  - deploy-ec2-rec
  - deploy-ppr
  - deploy-ec2-ppr

# Template job for building .NET applications.
.build_template:
  stage: build
  image: registry.gitlab.com/veolia.com/sarp/sarp/sarpdevint/ci-cd-repository/sarp-sonarqube-dotnet:net-4.8
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .\packages
      - .\Src\Jason.App\*\bin
      - .\Src\Jason.App\*\obj
    policy: pull-push
  script:
    - | 
      if ($env:DO_BUILD -eq "false") {
        Write-Host "No Build mode enabled, skipping build"
        exit 0  # Exit with success status
      }
    # Create a directory for logs.
    - '& New-Item -ItemType Directory -Force -Path "logs"'
    # Add the custom NuGet source.
    - '& nuget sources add -name jason -Source https://jason-nuget.sarpnet.fr/nuget/'
    # Restore NuGet packages and log the output.
    - '& nuget restore $env:SOLUTION > logs/nuget_restore.log 2>&1'
    # Begin SonarQube analysis.
    - |
      if ($env:SONAR_ANALYSIS -eq "true") {
        & SonarScanner.MSBuild.exe begin /k:$SONAR_PROJECT_NAME /d:sonar.host.url=http://10.79.152.7 /d:sonar.token=$SONAR_TOKEN /d:sonar.exclusions="**/bin/**/*,**/obj/**/*,**/packages/**/*,**/*.dll, **/*.sql, **/*.tsql, **/*.exe, **/*.js, **/*.css, **/*.json" /d:sonar.cs.file.suffixes=".cs" > logs/sonar_begin.log 2>&1
      }
    # Build and publish the web application.
    - '& msbuild /m /p:DeployOnBuild=true /p:Configuration=Release /p:PublishProfile=FolderProfile $env:TARGET_WEB > logs/build_webapp.log 2>&1'
    # Build and publish the job service.
    - '& msbuild /m /t:Publish /p:Configuration=Release $env:TARGET_JOB > logs/build_service_job.log 2>&1'
    # Build and publish the print service.
    - '& msbuild /m /t:Publish /p:Configuration=Release $env:TARGET_PRINT  > logs/build_service_print.log 2>&1'
    # Build and publish the main service.
    - '& msbuild /m /t:Publish /p:Configuration=Release $env:TARGET_SERVICE > logs/build_service_service.log 2>&1'
    # End SonarQube analysis.
    - |
      if ($env:SONAR_ANALYSIS -eq "true") {
        & SonarScanner.MSBuild.exe end /d:sonar.login=$SONAR_TOKEN
      }
  variables:
    SOLUTION: .\Src\Jason.App\Jason.sln
    TARGET_WEB: .\Src\Jason.App\App\Jason.Web\Jason.Web.csproj
    TARGET_JOB: .\Src\Jason.App\Jason.JobHost\Jason.JobHost.csproj
    TARGET_PRINT: .\Src\Jason.App\Jason.PrintHost\Jason.PrintHost.csproj
    TARGET_SERVICE: .\Src\Jason.App\Jason.Services.Host\Jason.Services.Host.csproj
    PACKAGE_DIRECTORY: .\packages
    DOTNET_FRAMEWORK: 4.5
  artifacts:
    when: always
    paths:
      - .\Src\Jason.App\App\Jason.Web\bin\app.publish
      - .\Src\Jason.App\Jason.JobHost\bin\Release
      - .\Src\Jason.App\Jason.PrintHost\bin\Release
      - .\Src\Jason.App\Jason.Services.Host\bin\Release
      - .\logs
  tags:
    - prd-win-2022
  only:
    - tags

# Build job for all the environment.
build:
  extends: .build_template
  variables:
    SONAR_ANALYSIS: "false"

# Template job for deploying to AWS S3.
.push_s3_template:
  image:
    name: amazon/aws-cli
    entrypoint: [""]
  stage: push-s3
  before_script:
    - yum install zip -y
    - yum install unix2dos -y
  script:
    - |
      if [ ! -z "$CI_COMMIT_TAG" ]; then
        PIPELINE_ID=$CI_COMMIT_TAG
      else
        PIPELINE_ID=$CI_PIPELINE_IID
      fi

    - OBJECT_KEY_WEB="jason/$S3_ENV/$PIPELINE_ID/Web/Web.zip"
    - OBJECT_KEY_JOB="jason/$S3_ENV/$PIPELINE_ID/Services/JobHost.zip"
    - OBJECT_KEY_PRINT="jason/$S3_ENV/$PIPELINE_ID/Services/PrintHost.zip"
    - OBJECT_KEY_SERVICE="jason/$S3_ENV/$PIPELINE_ID/Services/ServicesHost.zip"
    - OBJECT_KEY_CONFIGS_SERVICE="jason/$S3_ENV/$PIPELINE_ID/Services/Configs.zip"
    - OBJECT_KEY_CONFIGS_WEB="jason/$S3_ENV/$PIPELINE_ID/Web/Configs.zip"
    - OBJECT_KEY_DB="jason/$S3_ENV/$PIPELINE_ID/Services/Db.zip"

    - |
      if [ "$DO_BUILD" = "false" ]; then
      echo "Test mode enabled, skipping deployment"
      exit 0  # Exit with success status
      fi
    # Deploy the web application.
    - cd ./Src/Jason.App/App/Jason.Web/bin/app.publish
    - zip -r jasonwebappbin.zip . && cd ./
    - aws s3 cp jasonwebappbin.zip s3://$S3_BUCKET/$OBJECT_KEY_WEB
    - cd ../../../../../../
    # Deploy the JobHost application.
    - cd ./Src/Jason.App/Jason.JobHost/bin/Release
    - zip -r JobHost.zip . && cd ./
    - aws s3 cp JobHost.zip s3://$S3_BUCKET/$OBJECT_KEY_JOB
    - cd ../../../../../
    # Deploy the PrintHost application.
    - cd ./Src/Jason.App/Jason.PrintHost/bin/Release
    - zip -r PrintHost.zip . && cd ./
    - aws s3 cp PrintHost.zip s3://$S3_BUCKET/$OBJECT_KEY_PRINT
    - cd ../../../../../
    # Deploy the ServicesHost application.
    - cd ./Src/Jason.App/Jason.Services.Host/bin/Release
    - zip -r ServicesHost.zip . && cd ./
    - aws s3 cp ServicesHost.zip s3://$S3_BUCKET/$OBJECT_KEY_SERVICE
    - cd ../../../../../
    # Deploy the confs Files.
    - cd ./CICD/configs/$CONFIG_ENV
    - |
      for File in *; do 
        sed -i.bak 's/__VERSION__/'$CI_COMMIT_REF_NAME'/g' "$File"
        unix2dos "$File"
        rm "$File.bak"
      done
    - zip -r Configs.zip . && cd ./
    - aws s3 cp Configs.zip s3://$S3_BUCKET/$OBJECT_KEY_CONFIGS_SERVICE
    - aws s3 cp Configs.zip s3://$S3_BUCKET/$OBJECT_KEY_CONFIGS_WEB
    - cd ../../../
    # Deploy the DBs Files.
    - cd ./Db
    - zip -r Db.zip proc_stock_rs "procedures stockees" upgrade views
    - aws s3 cp Db.zip s3://$S3_BUCKET/$OBJECT_KEY_DB
    - cd ../
  dependencies:
    - build #le faire dans le template
  tags:
    - prd
  only:
    - tags
  
